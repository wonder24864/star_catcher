name: star-catcher

services:
  star-catcher-app:
    image: star-catcher:${IMAGE_TAG:-latest}
    container_name: star-catcher-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://star_catcher:${DB_PASSWORD}@star-catcher-db:5432/star_catcher
      - REDIS_URL=redis://star-catcher-redis:6379
      - MINIO_ENDPOINT=star-catcher-minio
      - MINIO_PUBLIC_ENDPOINT=${NAS_TAILSCALE_HOSTNAME}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-star-catcher}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - AI_PROVIDER=azure
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-azure}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DEPLOYMENT=${EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-false}
      - SEMANTIC_CACHE_TTL_HOURS=${SEMANTIC_CACHE_TTL_HOURS:-168}
      - SEMANTIC_CACHE_SIMILARITY_THRESHOLD=${SEMANTIC_CACHE_SIMILARITY_THRESHOLD:-0.95}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - JAEGER_UI_URL=${JAEGER_UI_URL:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://${NAS_TAILSCALE_HOSTNAME}:${APP_PORT:-3000}
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Star Catcher}
      - NEXT_PUBLIC_DEFAULT_LOCALE=${NEXT_PUBLIC_DEFAULT_LOCALE:-zh}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD}
      - RUN_MIGRATE=1
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_PRETTY=false
    depends_on:
      star-catcher-db:
        condition: service_healthy
      star-catcher-redis:
        condition: service_healthy
      star-catcher-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${APP_MEM:-1G}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  star-catcher-worker:
    image: star-catcher:${IMAGE_TAG:-latest}
    container_name: star-catcher-worker
    command: ["node", "worker.js"]
    environment:
      - DATABASE_URL=postgresql://star_catcher:${DB_PASSWORD}@star-catcher-db:5432/star_catcher
      - REDIS_URL=redis://star-catcher-redis:6379
      - MINIO_ENDPOINT=star-catcher-minio
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-star-catcher}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - AI_PROVIDER=azure
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-azure}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DEPLOYMENT=${EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-false}
      - SEMANTIC_CACHE_TTL_HOURS=${SEMANTIC_CACHE_TTL_HOURS:-168}
      - SEMANTIC_CACHE_SIMILARITY_THRESHOLD=${SEMANTIC_CACHE_SIMILARITY_THRESHOLD:-0.95}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_PRETTY=false
      - WORKER_MODE=true
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
    depends_on:
      star-catcher-db:
        condition: service_healthy
      star-catcher-redis:
        condition: service_healthy
      star-catcher-minio:
        condition: service_healthy
    healthcheck:
      # Check that worker is writing /tmp/worker-alive within 60s. Catches
      # frozen event loops that pgrep would miss. See src/worker/index.ts.
      test: ["CMD-SHELL", "node -e \"const m=require('fs').statSync('/tmp/worker-alive').mtimeMs;if(Date.now()-m>60000)process.exit(1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEM:-1G}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  star-catcher-db:
    image: pgvector/pgvector:pg16
    container_name: star-catcher-db
    environment:
      - POSTGRES_USER=star_catcher
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=star_catcher
    volumes:
      - ${DATA_PATH_PREFIX:-./data}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U star_catcher -d star_catcher"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${DB_MEM:-1G}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  star-catcher-redis:
    image: redis:7-alpine
    container_name: star-catcher-redis
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - ${DATA_PATH_PREFIX:-./data}/redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM:-512M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  star-catcher-minio:
    image: minio/minio
    container_name: star-catcher-minio
    command: server /data --address ":${MINIO_PORT:-9000}" --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - ${DATA_PATH_PREFIX:-./data}/miniodata:/data
    ports:
      - "${MINIO_PORT:-9000}:${MINIO_PORT:-9000}"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${MINIO_PORT:-9000}/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEM:-512M}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

# Data volumes use bind mount to ${DATA_PATH_PREFIX:-./data} (relative to compose
# file dir). Docker auto-creates pgdata/redisdata/miniodata subdirs on first run;
# pgvector/redis/minio official images handle ownership via their own entrypoints,
# so PUID/PGID env vars (a linuxserver.io convention) are not needed for this stack.
