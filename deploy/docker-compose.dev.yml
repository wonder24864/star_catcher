name: star-catcher

services:
  star-catcher-app:
    build: ..
    container_name: star-catcher-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://star_catcher:${DB_PASSWORD}@star-catcher-db:5432/star_catcher
      - REDIS_URL=redis://star-catcher-redis:6379
      - MINIO_ENDPOINT=star-catcher-minio
      - MINIO_PUBLIC_ENDPOINT=localhost
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-star-catcher}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - AI_PROVIDER=azure
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-azure}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DEPLOYMENT=${EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-false}
      - SEMANTIC_CACHE_TTL_HOURS=${SEMANTIC_CACHE_TTL_HOURS:-168}
      - SEMANTIC_CACHE_SIMILARITY_THRESHOLD=${SEMANTIC_CACHE_SIMILARITY_THRESHOLD:-0.95}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://star-catcher-jaeger:4318}
      - JAEGER_UI_URL=${JAEGER_UI_URL:-http://localhost:16686}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Star Catcher}
      - NEXT_PUBLIC_DEFAULT_LOCALE=${NEXT_PUBLIC_DEFAULT_LOCALE:-zh}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_PRETTY=${LOG_PRETTY:-true}
    depends_on:
      - star-catcher-db
      - star-catcher-redis
      - star-catcher-minio
    restart: unless-stopped

  star-catcher-worker:
    build: ..
    container_name: star-catcher-worker
    command: ["node", "worker.js"]
    environment:
      - DATABASE_URL=postgresql://star_catcher:${DB_PASSWORD}@star-catcher-db:5432/star_catcher
      - REDIS_URL=redis://star-catcher-redis:6379
      - MINIO_ENDPOINT=star-catcher-minio
      - MINIO_PUBLIC_ENDPOINT=localhost
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-star-catcher}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - AI_PROVIDER=azure
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-azure}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DEPLOYMENT=${EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-false}
      - SEMANTIC_CACHE_TTL_HOURS=${SEMANTIC_CACHE_TTL_HOURS:-168}
      - SEMANTIC_CACHE_SIMILARITY_THRESHOLD=${SEMANTIC_CACHE_SIMILARITY_THRESHOLD:-0.95}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://star-catcher-jaeger:4318}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_PRETTY=${LOG_PRETTY:-true}
      - WORKER_MODE=true
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
    depends_on:
      - star-catcher-db
      - star-catcher-redis
      - star-catcher-minio
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const m=require('fs').statSync('/tmp/worker-alive').mtimeMs;if(Date.now()-m>60000)process.exit(1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  star-catcher-db:
    image: pgvector/pgvector:pg16
    container_name: star-catcher-db
    environment:
      - POSTGRES_USER=star_catcher
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=star_catcher
    volumes:
      - star-catcher-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  star-catcher-redis:
    image: redis:7-alpine
    container_name: star-catcher-redis
    volumes:
      - star-catcher-redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  star-catcher-minio:
    image: minio/minio
    container_name: star-catcher-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - star-catcher-miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  star-catcher-jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: star-catcher-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  star-catcher-pgdata:
  star-catcher-redisdata:
  star-catcher-miniodata:
